<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ProveLink</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #161616;
    --bg-elev2: #1f1f1f;
    --bg-elev3: #2a2a2a;
    --border: #2a2a2a;
    --text: #ededed;
    --text-muted: #888;
    --accent: #4ade80;
    --accent-hover: #22c55e;
    --danger: #ef4444;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Loader inicial ===== */
  .loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--bg-elev2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Header ===== */
  .header {
    position: sticky;
    top: 0;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .header-logo {
    font-size: 22px;
  }
  .header-titulos {
    min-width: 0;
  }
  .header-negocio {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }
  .header-plan {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .header-plan.pro { color: var(--accent); }
  .header-plan.business { color: #fbbf24; }
  .menu-btn {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== Menú desplegable ===== */
  .menu {
    position: absolute;
    top: 56px;
    right: 16px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    min-width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
  }
  .menu.open { display: block; }
  .menu-item {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .menu-item:hover { background: var(--bg-elev2); }
  .menu-item.danger { color: var(--danger); }
  .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ===== Contenido principal ===== */
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 100px;
  }

  .seccion-titulo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 12px;
  }
  .seccion-titulo h2 {
    font-size: 18px;
    font-weight: 600;
  }
  .badge {
    background: var(--bg-elev2);
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 500;
  }
  .badge.warn { background: #2d2010; color: var(--warn); }

  /* ===== Botones ===== */
  .btn {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 9px;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-elev3); }
  .btn.primary {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.danger {
    background: transparent;
    color: var(--danger);
    border-color: #5a2828;
  }
  .btn.danger:hover { background: #2d1414; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-icon {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    font-size: 16px;
  }
  .btn-icon:hover { background: var(--bg-elev2); color: var(--text); }

  /* ===== Lista de proveedores ===== */
  .prov-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .prov-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .prov-logo {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--bg-elev2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
  }
  .prov-info { flex: 1; min-width: 0; }
  .prov-nombre {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .prov-tel {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .prov-actions {
    display: flex;
    gap: 4px;
  }

  /* ===== Empty state ===== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .empty-sub { font-size: 13px; margin-bottom: 20px; }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 500;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 700px;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 16px; border: 1px solid var(--border); }
  }
  .modal h3 {
    font-size: 18px;
    margin-bottom: 16px;
  }
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .form-row input[type="text"],
  .form-row input[type="tel"],
  .form-row input[type="email"] {
    width: 100%;
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 9px;
    font-size: 15px;
    outline: none;
  }
  .form-row input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    box-shadow: 0 6px 16px rgba(0,0,0,0.5);
    animation: toastIn 0.2s ease;
  }
  .toast.success { border-color: var(--accent); }
  .toast.error { border-color: var(--danger); color: #fca5a5; }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ===== Plan banner ===== */
  .plan-banner {
    background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .plan-banner.warn {
    background: linear-gradient(135deg, #2d2010 0%, #3a2a14 100%);
    border-color: #5a401c;
  }
  .plan-banner-txt {
    font-size: 13px;
    color: var(--text-muted);
  }
  .plan-banner-txt strong { color: var(--text); }

  /* ===== Tabs ===== */
  .tabs-nav {
    display: flex;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 12px;
    text-align: center;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--bg-elev2);
    color: var(--text);
  }
  .tab-section { display: none; }
  .tab-section.active { display: block; }

  /* ===== Listas de precios ===== */
  .lista-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .lista-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 4px;
  }
  .lista-prov {
    font-weight: 600;
    font-size: 15px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lista-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .lista-items-count {
    background: var(--bg-elev2);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }

  /* Modal de lista de precios */
  .modal-lg .modal {
    max-width: 800px;
  }
  .upload-zone {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .upload-btn {
    flex: 1;
    background: var(--bg-elev2);
    border: 1px dashed var(--border);
    color: var(--text);
    padding: 14px;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .upload-btn:hover {
    border-color: var(--accent);
    background: var(--bg-elev3);
  }
  .loading-box {
    background: #14271a;
    border: 1px solid #2d5a3a;
    color: #86efac;
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .preview-tabla {
    max-height: 380px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 9px;
    margin-bottom: 14px;
  }
  .preview-fila {
    display: flex;
    gap: 8px;
    padding: 8px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .preview-fila:last-child { border-bottom: none; }
  .preview-fila input {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 9px;
    border-radius: 7px;
    font-size: 13px;
    outline: none;
  }
  .preview-fila input.nombre { flex: 1; min-width: 0; }
  .preview-fila input.precio { width: 100px; text-align: right; }
  .preview-fila .btn-icon { padding: 4px; }

  .buscador {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 9px;
    font-size: 14px;
    width: 100%;
    margin-bottom: 12px;
    outline: none;
  }
  .buscador:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- Loader inicial mientras verifica sesión -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<!-- Header -->
<div class="header" id="header" style="display:none;">
  <div class="header-left">
    <div class="header-logo">📦</div>
    <div class="header-titulos">
      <div class="header-negocio" id="header-negocio">—</div>
      <div class="header-plan" id="header-plan">FREE</div>
    </div>
  </div>
  <button class="menu-btn" onclick="toggleMenu()">⋮</button>
</div>

<!-- Menú -->
<div class="menu" id="menu">
  <div class="menu-item" onclick="abrirPlanes()">⭐ Cambiar plan</div>
  <div class="menu-item" onclick="abrirConfig()">⚙️ Configuración</div>
  <div class="menu-divider"></div>
  <div class="menu-item danger" onclick="cerrarSesion()">🚪 Cerrar sesión</div>
</div>

<!-- Contenido -->
<div class="container" id="app" style="display:none;">

  <!-- Banner del plan -->
  <div class="plan-banner" id="plan-banner" style="display:none;">
    <div class="plan-banner-txt" id="plan-banner-txt"></div>
    <button class="btn primary" onclick="abrirPlanes()">Mejorar</button>
  </div>

  <!-- Tabs de navegación -->
  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="proveedores" onclick="cambiarTab('proveedores')">Proveedores</button>
    <button class="tab-btn" data-tab="listas" onclick="cambiarTab('listas')">Listas</button>
  </div>

  <!-- ============ TAB: PROVEEDORES ============ -->
  <div class="tab-section active" id="tab-proveedores">
    <div class="seccion-titulo">
      <h2>Proveedores <span class="badge" id="prov-count">0</span></h2>
      <button class="btn primary" onclick="abrirModalProv()">+ Nuevo</button>
    </div>

    <div id="prov-lista">
      <div class="empty">
        <div class="empty-emoji">📦</div>
        <div class="empty-title">Cargando...</div>
      </div>
    </div>
  </div>

  <!-- ============ TAB: LISTAS ============ -->
  <div class="tab-section" id="tab-listas">
    <div class="seccion-titulo">
      <h2>Listas de precios <span class="badge" id="listas-count">0</span></h2>
      <button class="btn primary" onclick="abrirModalLista()">+ Cargar</button>
    </div>

    <div id="listas-lista">
      <div class="empty">
        <div class="empty-emoji">📋</div>
        <div class="empty-title">Cargando...</div>
      </div>
    </div>
  </div>

</div>

<!-- Modal nuevo/editar proveedor -->
<div class="modal-overlay" id="modal-prov">
  <div class="modal">
    <h3 id="modal-prov-titulo">Nuevo proveedor</h3>

    <div class="form-row">
      <label for="prov-nombre">Nombre *</label>
      <input type="text" id="prov-nombre" placeholder="Ej: Distribuidora La Estrella">
    </div>

    <div class="form-row">
      <label for="prov-telefono">Teléfono (opcional)</label>
      <input type="tel" id="prov-telefono" placeholder="Ej: 11 1234 5678">
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="cerrarModalProv()">Cancelar</button>
      <button class="btn primary" id="btn-guardar-prov" onclick="guardarProveedor()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal cargar/editar lista de precios -->
<div class="modal-overlay modal-lg" id="modal-lista">
  <div class="modal">
    <h3 id="modal-lista-titulo">Cargar lista de precios</h3>

    <div class="form-row">
      <label for="lista-prov-select">Proveedor *</label>
      <select id="lista-prov-select" style="width:100%;background:var(--bg-elev2);border:1px solid var(--border);color:var(--text);padding:11px 12px;border-radius:9px;font-size:15px;"></select>
    </div>

    <div class="upload-zone">
      <button class="upload-btn" onclick="document.getElementById('lista-input-img').click()">
        📷 Subir foto o PDF
      </button>
    </div>
    <input type="file" id="lista-input-img" accept="image/*,application/pdf" style="display:none;" onchange="procesarArchivo(event)">

    <div class="loading-box" id="lista-loading">Procesando...</div>

    <div style="margin-bottom:10px;font-size:13px;color:var(--text-muted);" id="preview-info"></div>

    <div class="preview-tabla" id="preview-tabla" style="display:none;"></div>

    <div class="modal-actions">
      <button class="btn" onclick="cerrarModalLista()">Cancelar</button>
      <button class="btn danger" id="btn-eliminar-lista" onclick="eliminarLista()" style="display:none;">Eliminar</button>
      <button class="btn primary" id="btn-guardar-lista" onclick="guardarLista()" disabled>Guardar</button>
    </div>
  </div>
</div>

<!-- Modal ver lista (con buscador) -->
<div class="modal-overlay modal-lg" id="modal-ver-lista">
  <div class="modal">
    <h3 id="ver-lista-titulo">Lista de precios</h3>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;" id="ver-lista-fecha"></div>

    <input type="text" class="buscador" id="ver-lista-buscar" placeholder="🔍 Buscar producto..." oninput="filtrarVerLista()">

    <div class="preview-tabla" id="ver-lista-items"></div>

    <div class="modal-actions">
      <button class="btn" onclick="cerrarVerLista()">Cerrar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIG
// ============================================================
var SUPABASE_URL = 'https://himtrizetvkywrtperqu.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbXRyaXpldHZreXdydHBlcnF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjAxODgsImV4cCI6MjA5NDQzNjE4OH0.MIuFHZmJMxVYZmJ3SXBgKumw9XYLrhNwHNlzfNgKMVs';

var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Estado global
var sesion = null;
var profile = null;
var proveedores = [];
var provEditandoId = null;
var listas = [];
var listaEditandoId = null;  // id del proveedor cuya lista estamos editando
var filasPreview = [];  // [{productoLista, precio}, ...] del preview de la nueva lista
var verListaItems = [];  // items en la modal de ver lista (para filtrar)

// Límites por plan (espejo de la función SQL)
var LIMITES = {
  free:     { proveedores: 3,   consultasIA: 0 },
  pro:      { proveedores: 999, consultasIA: 150 },
  business: { proveedores: 999, consultasIA: 500 }
};

// ============================================================
// HELPERS
// ============================================================
function $(id) { return document.getElementById(id); }

function showToast(msg, tipo) {
  var t = document.createElement('div');
  t.className = 'toast' + (tipo ? ' ' + tipo : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.2s';
    setTimeout(function() { t.remove(); }, 200);
  }, 2500);
}

function toggleMenu() {
  $('menu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.menu-btn') && !e.target.closest('.menu')) {
    $('menu').classList.remove('open');
  }
});

// ============================================================
// AUTH
// ============================================================
async function verificarSesion() {
  try {
    var { data: { session }, error } = await supabase.auth.getSession();
    if (error) throw error;
    if (!session) {
      // No hay sesión -> al login
      window.location.href = '/login.html';
      return false;
    }
    sesion = session;
    return true;
  } catch(e) {
    console.error('verificarSesion', e);
    showToast('Error de autenticación', 'error');
    return false;
  }
}

async function cargarProfile() {
  try {
    var { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', sesion.user.id)
      .single();
    if (error) throw error;
    profile = data;
    return true;
  } catch(e) {
    console.error('cargarProfile', e);
    showToast('No se pudo cargar tu perfil', 'error');
    return false;
  }
}

async function cerrarSesion() {
  if (!confirm('¿Cerrar sesión?')) return;
  try {
    await supabase.auth.signOut();
    window.location.href = '/login.html';
  } catch(e) {
    console.error('logout', e);
  }
}

// ============================================================
// RENDERIZAR HEADER + PLAN BANNER
// ============================================================
function renderHeader() {
  $('header-negocio').textContent = profile.nombre_negocio || profile.email || 'Mi negocio';
  var planEl = $('header-plan');
  planEl.textContent = (profile.plan || 'free').toUpperCase();
  planEl.className = 'header-plan ' + (profile.plan || 'free');
}

function renderPlanBanner() {
  var banner = $('plan-banner');
  var txt = $('plan-banner-txt');
  if (profile.plan === 'free') {
    var max = LIMITES.free.proveedores;
    if (proveedores.length >= max) {
      banner.classList.add('warn');
      txt.innerHTML = 'Llegaste al límite del plan <strong>Free</strong> (' + max + ' proveedores). Mejorá a <strong>Pro</strong> para tener ilimitados + asistente IA.';
      banner.style.display = 'flex';
    } else {
      banner.classList.remove('warn');
      txt.innerHTML = 'Plan <strong>Free</strong>: ' + proveedores.length + ' de ' + max + ' proveedores · Sin IA';
      banner.style.display = 'flex';
    }
  } else {
    banner.style.display = 'none';
  }
}

// ============================================================
// PROVEEDORES — CRUD
// ============================================================
async function cargarProveedores() {
  try {
    var { data, error } = await supabase
      .from('proveedores')
      .select('*')
      .order('nombre', { ascending: true });
    if (error) throw error;
    proveedores = data || [];
    renderProveedores();
    renderPlanBanner();
  } catch(e) {
    console.error('cargarProveedores', e);
    showToast('Error al cargar proveedores', 'error');
  }
}

function renderProveedores() {
  $('prov-count').textContent = proveedores.length;
  var cont = $('prov-lista');
  if (proveedores.length === 0) {
    cont.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">📦</div>' +
      '<div class="empty-title">No tenés proveedores todavía</div>' +
      '<div class="empty-sub">Empezá agregando uno con el botón "+ Nuevo"</div>' +
      '</div>';
    return;
  }
  var html = '<div class="prov-grid">';
  proveedores.forEach(function(p) {
    var inicial = (p.nombre || '?').charAt(0).toUpperCase();
    var logoStyle = p.logo_url ? 'style="background-image:url(\'' + p.logo_url + '\')"' : '';
    var logoTxt = p.logo_url ? '' : inicial;
    html += '<div class="prov-card">' +
      '<div class="prov-logo" ' + logoStyle + '>' + logoTxt + '</div>' +
      '<div class="prov-info">' +
        '<div class="prov-nombre">' + escapeHtml(p.nombre) + '</div>' +
        (p.telefono ? '<div class="prov-tel">📞 ' + escapeHtml(p.telefono) + '</div>' : '') +
      '</div>' +
      '<div class="prov-actions">' +
        '<button class="btn-icon" onclick="editarProveedor(\'' + p.id + '\')" title="Editar">✏️</button>' +
        '<button class="btn-icon" onclick="borrarProveedor(\'' + p.id + '\')" title="Borrar">🗑️</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  cont.innerHTML = html;
}

function abrirModalProv() {
  // Validar límite del plan
  var limite = LIMITES[profile.plan || 'free'].proveedores;
  if (proveedores.length >= limite) {
    showToast('Llegaste al límite de tu plan. Mejorá para agregar más.', 'error');
    return;
  }
  provEditandoId = null;
  $('modal-prov-titulo').textContent = 'Nuevo proveedor';
  $('prov-nombre').value = '';
  $('prov-telefono').value = '';
  $('modal-prov').classList.add('open');
  setTimeout(function() { $('prov-nombre').focus(); }, 100);
}

function editarProveedor(id) {
  var p = proveedores.find(function(x) { return x.id === id; });
  if (!p) return;
  provEditandoId = id;
  $('modal-prov-titulo').textContent = 'Editar proveedor';
  $('prov-nombre').value = p.nombre || '';
  $('prov-telefono').value = p.telefono || '';
  $('modal-prov').classList.add('open');
}

function cerrarModalProv() {
  $('modal-prov').classList.remove('open');
}

async function guardarProveedor() {
  var nombre = $('prov-nombre').value.trim();
  var tel = $('prov-telefono').value.trim();
  if (!nombre) {
    showToast('El nombre es obligatorio', 'error');
    return;
  }
  var btn = $('btn-guardar-prov');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  try {
    if (provEditandoId) {
      // Update
      var { error } = await supabase
        .from('proveedores')
        .update({ nombre: nombre, telefono: tel || null, actualizado: new Date().toISOString() })
        .eq('id', provEditandoId);
      if (error) throw error;
      showToast('Proveedor actualizado', 'success');
    } else {
      // Insert
      var { error } = await supabase
        .from('proveedores')
        .insert({ user_id: sesion.user.id, nombre: nombre, telefono: tel || null });
      if (error) throw error;
      showToast('Proveedor agregado', 'success');
    }
    cerrarModalProv();
    await cargarProveedores();
  } catch(e) {
    console.error('guardarProveedor', e);
    showToast('Error al guardar: ' + (e.message || ''), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

async function borrarProveedor(id) {
  var p = proveedores.find(function(x) { return x.id === id; });
  if (!p) return;
  if (!confirm('¿Borrar el proveedor "' + p.nombre + '"?\n\nTambién se borran sus listas de precios y snapshots.')) return;
  try {
    var { error } = await supabase
      .from('proveedores')
      .delete()
      .eq('id', id);
    if (error) throw error;
    showToast('Proveedor borrado', 'success');
    await cargarProveedores();
  } catch(e) {
    console.error('borrarProveedor', e);
    showToast('Error al borrar', 'error');
  }
}

// ============================================================
// TABS — Cambiar entre Proveedores / Listas
// ============================================================
function cambiarTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-section').forEach(function(s) {
    s.classList.toggle('active', s.id === 'tab-' + tab);
  });
  if (tab === 'listas') {
    cargarListas();
  }
}

// ============================================================
// LISTAS DE PRECIOS — Carga y render
// ============================================================
async function cargarListas() {
  try {
    var { data, error } = await supabase
      .from('listas_precios')
      .select('*')
      .order('fecha_actualizacion', { ascending: false });
    if (error) throw error;
    listas = data || [];
    renderListas();
  } catch(e) {
    console.error('cargarListas', e);
    showToast('Error al cargar listas', 'error');
  }
}

function renderListas() {
  $('listas-count').textContent = listas.length;
  var cont = $('listas-lista');
  if (proveedores.length === 0) {
    cont.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">📋</div>' +
      '<div class="empty-title">Primero agregá proveedores</div>' +
      '<div class="empty-sub">Las listas de precios se asocian a un proveedor</div>' +
      '</div>';
    return;
  }
  if (listas.length === 0) {
    cont.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">📋</div>' +
      '<div class="empty-title">No cargaste ninguna lista todavía</div>' +
      '<div class="empty-sub">Subí una foto o PDF y la IA extrae los productos sola</div>' +
      '</div>';
    return;
  }
  var html = '';
  listas.forEach(function(l) {
    var prov = proveedores.find(function(p) { return p.id === l.proveedor_id; });
    var provNombre = prov ? prov.nombre : '?';
    var cantItems = (l.items || []).length;
    var fechaStr = new Date(l.fecha_actualizacion).toLocaleDateString('es-AR', { day: 'numeric', month: 'short', year: 'numeric' });
    html += '<div class="lista-card">' +
      '<div class="lista-header">' +
        '<div class="lista-prov">' + escapeHtml(provNombre) + '</div>' +
        '<span class="lista-items-count">' + cantItems + ' items</span>' +
      '</div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">' +
        '<div class="lista-meta">Actualizada ' + fechaStr + '</div>' +
        '<div style="display:flex;gap:4px;">' +
          '<button class="btn-icon" onclick="abrirVerLista(\'' + l.proveedor_id + '\')" title="Ver">👁️</button>' +
          '<button class="btn-icon" onclick="abrirModalLista(\'' + l.proveedor_id + '\')" title="Editar">✏️</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  cont.innerHTML = html;
}

// ============================================================
// MODAL: cargar/editar lista
// ============================================================
function abrirModalLista(proveedorId) {
  if (proveedores.length === 0) {
    showToast('Primero agregá un proveedor', 'error');
    return;
  }
  // Plan free: no permitir IA (procesar archivo)
  // pero sí permitir cargar lista manualmente (en una próxima iteración).
  // Por ahora: si free, avisar
  if (profile.plan === 'free') {
    showToast('Cargar listas requiere plan Pro o superior (usa IA)', 'error');
    return;
  }

  listaEditandoId = proveedorId || null;
  filasPreview = [];

  // Llenar select de proveedores
  var sel = $('lista-prov-select');
  sel.innerHTML = '';
  proveedores.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.nombre;
    sel.appendChild(opt);
  });

  if (proveedorId) {
    // Modo edición: cargar lista existente
    var lista = listas.find(function(l) { return l.proveedor_id === proveedorId; });
    if (lista) {
      sel.value = proveedorId;
      sel.disabled = true;
      filasPreview = (lista.items || []).map(function(it) {
        return { productoLista: it.productoLista, precio: parseFloat(it.precio) };
      });
      $('modal-lista-titulo').textContent = 'Editar lista de precios';
      $('btn-eliminar-lista').style.display = 'inline-flex';
      renderPreview();
    }
  } else {
    sel.disabled = false;
    $('modal-lista-titulo').textContent = 'Cargar lista de precios';
    $('btn-eliminar-lista').style.display = 'none';
    $('preview-tabla').style.display = 'none';
    $('preview-info').textContent = '';
    $('btn-guardar-lista').disabled = true;
  }

  $('lista-loading').style.display = 'none';
  $('modal-lista').classList.add('open');
}

function cerrarModalLista() {
  $('modal-lista').classList.remove('open');
  $('lista-input-img').value = '';
  filasPreview = [];
  listaEditandoId = null;
}

// ============================================================
// Procesar archivo con IA (foto o PDF)
// ============================================================
function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function() { resolve(r.result.split(',')[1]); };
    r.onerror = function() { reject(new Error('No se pudo leer el archivo')); };
    r.readAsDataURL(file);
  });
}

async function procesarArchivo(event) {
  var file = event.target.files[0];
  if (!file) return;

  // Validar tamaño (max 5 MB)
  var maxBytes = 5 * 1024 * 1024;
  if (file.size > maxBytes) {
    showToast('El archivo es muy grande (máx 5 MB). Probá con una foto de menor resolución.', 'error');
    event.target.value = '';
    return;
  }

  // Mostrar loading
  var loading = $('lista-loading');
  loading.textContent = '🔄 Procesando con IA... (puede tardar 20-40 seg)';
  loading.style.display = 'block';
  $('btn-guardar-lista').disabled = true;

  try {
    var base64 = await fileToBase64(file);
    var mimeType = file.type || 'image/jpeg';

    var prompt = 'Esta imagen o PDF es una lista de precios de un proveedor. Extrae cada producto con su precio.\n\nIMPORTANTE:\n- Devolvé EXCLUSIVAMENTE un array JSON, sin texto adicional, sin markdown.\n- Cada elemento: {"nombre": "...", "precio": numero}\n- Mantené los nombres COMPLETOS incluyendo marca, presentación y tamaño del envase\n- El precio es solo el número (usá punto decimal: 9644.07)\n- Ignorá encabezados, totales, fechas y filas que no sean productos';

    // Llamar al backend (no a Claude directo)
    var resp = await fetch('/api/claude', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + sesion.access_token
      },
      body: JSON.stringify({
        tipo: 'procesar_lista',
        max_tokens: 8000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    var data = await resp.json();
    if (!resp.ok) {
      throw new Error(data.error || 'Error desconocido');
    }

    var texto = data.content && data.content[0] && data.content[0].text || '';
    texto = texto.replace(/```json|```/g, '').trim();
    // Si la IA puso algo antes/después del array, extraer
    var ini = texto.indexOf('['), fin = texto.lastIndexOf(']');
    if (ini < 0 || fin <= ini) throw new Error('La IA no devolvió un formato válido');
    var items = JSON.parse(texto.slice(ini, fin + 1));

    filasPreview = items
      .filter(function(it) { return it.nombre && it.precio > 0; })
      .map(function(it) {
        return { productoLista: String(it.nombre).trim(), precio: parseFloat(it.precio) };
      });

    loading.style.display = 'none';
    renderPreview();
    showToast('IA extrajo ' + filasPreview.length + ' productos');

  } catch(e) {
    console.error('procesarArchivo', e);
    loading.style.display = 'none';
    showToast('Error: ' + (e.message || 'no se pudo procesar'), 'error');
  } finally {
    event.target.value = '';
  }
}

function renderPreview() {
  var tabla = $('preview-tabla');
  if (filasPreview.length === 0) {
    tabla.style.display = 'none';
    $('preview-info').textContent = '';
    $('btn-guardar-lista').disabled = true;
    return;
  }
  $('preview-info').textContent = 'Revisá y editá si hace falta. Después tocá "Guardar".';
  var html = '';
  filasPreview.forEach(function(it, idx) {
    html += '<div class="preview-fila">' +
      '<input type="text" class="nombre" value="' + escapeHtmlAttr(it.productoLista) + '" oninput="editarFilaPreview(' + idx + ', this.value, null)">' +
      '<input type="number" step="0.01" class="precio" value="' + it.precio + '" oninput="editarFilaPreview(' + idx + ', null, this.value)">' +
      '<button class="btn-icon" onclick="borrarFilaPreview(' + idx + ')" title="Borrar">🗑️</button>' +
    '</div>';
  });
  tabla.innerHTML = html;
  tabla.style.display = 'block';
  $('btn-guardar-lista').disabled = false;
}

function editarFilaPreview(idx, nombre, precio) {
  if (nombre !== null) filasPreview[idx].productoLista = nombre;
  if (precio !== null) {
    var p = parseFloat(precio);
    filasPreview[idx].precio = isNaN(p) ? 0 : p;
  }
}

function borrarFilaPreview(idx) {
  filasPreview.splice(idx, 1);
  renderPreview();
}

// ============================================================
// Guardar lista (con snapshot de la versión anterior)
// ============================================================
async function guardarLista() {
  var proveedorId = $('lista-prov-select').value;
  if (!proveedorId) {
    showToast('Seleccioná un proveedor', 'error');
    return;
  }
  // Filtrar filas válidas
  var items = filasPreview.filter(function(it) {
    return it.productoLista && it.productoLista.trim() && it.precio > 0;
  });
  if (items.length === 0) {
    showToast('No hay items válidos para guardar', 'error');
    return;
  }

  var btn = $('btn-guardar-lista');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    // 1) Si ya existe una lista para este proveedor, hacer snapshot de la anterior
    var listaExistente = listas.find(function(l) { return l.proveedor_id === proveedorId; });
    if (listaExistente && listaExistente.items && listaExistente.items.length > 0) {
      var { error: snapError } = await supabase
        .from('snapshots_precios')
        .insert({
          user_id: sesion.user.id,
          proveedor_id: proveedorId,
          items: listaExistente.items
        });
      if (snapError) console.error('Error guardando snapshot:', snapError);
    }

    // 2) Upsert de la lista (insert si no existe, update si existe)
    if (listaExistente) {
      var { error } = await supabase
        .from('listas_precios')
        .update({
          items: items,
          fecha_actualizacion: new Date().toISOString()
        })
        .eq('id', listaExistente.id);
      if (error) throw error;
    } else {
      var { error } = await supabase
        .from('listas_precios')
        .insert({
          user_id: sesion.user.id,
          proveedor_id: proveedorId,
          items: items
        });
      if (error) throw error;
    }

    showToast('Lista guardada (' + items.length + ' items)', 'success');
    cerrarModalLista();
    await cargarListas();
  } catch(e) {
    console.error('guardarLista', e);
    showToast('Error al guardar: ' + (e.message || ''), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

// ============================================================
// Eliminar lista entera
// ============================================================
async function eliminarLista() {
  if (!listaEditandoId) return;
  var prov = proveedores.find(function(p) { return p.id === listaEditandoId; });
  if (!confirm('¿Eliminar la lista de "' + (prov ? prov.nombre : '?') + '"?')) return;
  try {
    var { error } = await supabase
      .from('listas_precios')
      .delete()
      .eq('proveedor_id', listaEditandoId);
    if (error) throw error;
    showToast('Lista eliminada', 'success');
    cerrarModalLista();
    await cargarListas();
  } catch(e) {
    console.error('eliminarLista', e);
    showToast('Error: ' + (e.message || ''), 'error');
  }
}

// ============================================================
// Modal: ver lista (solo lectura con buscador)
// ============================================================
function abrirVerLista(proveedorId) {
  var lista = listas.find(function(l) { return l.proveedor_id === proveedorId; });
  if (!lista) return;
  var prov = proveedores.find(function(p) { return p.id === proveedorId; });
  $('ver-lista-titulo').textContent = 'Lista de ' + (prov ? prov.nombre : '?');
  var fechaStr = new Date(lista.fecha_actualizacion).toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
  $('ver-lista-fecha').textContent = (lista.items || []).length + ' items · Actualizada ' + fechaStr;
  $('ver-lista-buscar').value = '';
  verListaItems = lista.items || [];
  renderVerLista(verListaItems);
  $('modal-ver-lista').classList.add('open');
}

function cerrarVerLista() {
  $('modal-ver-lista').classList.remove('open');
}

function filtrarVerLista() {
  var q = $('ver-lista-buscar').value.toLowerCase().trim();
  if (!q) {
    renderVerLista(verListaItems);
    return;
  }
  var filtrados = verListaItems.filter(function(it) {
    return (it.productoLista || '').toLowerCase().indexOf(q) >= 0;
  });
  renderVerLista(filtrados);
}

function renderVerLista(items) {
  var cont = $('ver-lista-items');
  if (items.length === 0) {
    cont.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:13px;">Sin resultados</div>';
    return;
  }
  var html = '';
  items.forEach(function(it) {
    html += '<div class="preview-fila" style="cursor:default;">' +
      '<div style="flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(it.productoLista) + '</div>' +
      '<div style="font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;">' + formatPrecio(it.precio) + '</div>' +
    '</div>';
  });
  cont.innerHTML = html;
}

function formatPrecio(n) {
  if (isNaN(n)) return '$0';
  var num = parseFloat(n);
  var s = num.toFixed(2);
  var parts = s.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return '$' + parts.join(',');
}

function escapeHtmlAttr(s) {
  if (s == null) return '';
  return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/&/g, '&amp;');
}

// ============================================================
// PLACEHOLDERS para features futuras
// ============================================================
function abrirPlanes() {
  showToast('Página de planes próximamente');
}
function abrirConfig() {
  showToast('Configuración próximamente');
}

// ============================================================
// UTILS
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

// INIT
// ============================================================
(async function init() {
  var ok = await verificarSesion();
  if (!ok) return;
  ok = await cargarProfile();
  if (!ok) return;
  renderHeader();
  await cargarProveedores();
  $('loader').style.display = 'none';
  $('header').style.display = 'flex';
  $('app').style.display = 'block';
})();

// Enter en el modal para guardar
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && $('modal-prov').classList.contains('open')) {
    if (document.activeElement.tagName === 'INPUT') {
      guardarProveedor();
    }
  }
  if (e.key === 'Escape') {
    if ($('modal-prov').classList.contains('open')) cerrarModalProv();
    if ($('modal-lista').classList.contains('open')) cerrarModalLista();
    if ($('modal-ver-lista').classList.contains('open')) cerrarVerLista();
  }
});

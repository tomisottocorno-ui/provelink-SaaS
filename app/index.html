<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ProveLink</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22white%22><rect width=%2224%22 height=%2224%22 rx=%226%22/></svg>">
<link rel="stylesheet" href="/app/styles.css">
<script src="/app/icons.js"></script>

<body>

<!-- Loader inicial mientras verifica sesión -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="app-shell" id="app-shell" style="display:none;">

  <!-- ============ SIDEBAR (desktop) ============ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="header-logo"><img src="/imagenes/logo.png" alt="ProveLink" class="logo-img"></div>
      <div class="sidebar-brand-name">ProveLink</div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" data-tab="proveedores" onclick="cambiarTab('proveedores')" id="side-link-prov">

        <span class="icon-slot" data-icon="list"></span>
        <span>Listas de precios</span>

    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="toggleMenu()">

  <div class="container" id="app">

<!-- Menú desplegable global (mobile: top-right, desktop: junto al sidebar-user) -->

  <div class="menu-item" onclick="abrirPlanes()"><span class="icon-slot" data-icon="star"></span> Cambiar plan</div>
  <div class="menu-item" onclick="abrirConfig()"><span class="icon-slot" data-icon="settings"></span> Configuración</div>
  <div class="menu-divider"></div>
  <div class="menu-item danger" onclick="cerrarSesion()"><span class="icon-slot" data-icon="logout"></span> Cerrar sesión</div>

<!-- Modal nuevo/editar proveedor -->
<div class="modal-overlay" id="modal-prov">
  <div class="modal">
    <h3 id="modal-prov-titulo">Nuevo proveedor</h3>

    <div class="form-row">
      <label for="prov-nombre">Nombre *</label>
      <input type="text" id="prov-nombre" placeholder="Ej: Distribuidora La Estrella">
    </div>

    <div class="form-row">
      <label for="prov-telefono">Teléfono (opcional)</label>
      <input type="tel" id="prov-telefono" placeholder="Ej: 11 1234 5678">
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="cerrarModalProv()">Cancelar</button>
      <button class="btn primary" id="btn-guardar-prov" onclick="guardarProveedor()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal cargar/editar lista de precios -->
<div class="modal-overlay modal-lg" id="modal-lista">
  <div class="modal">
    <h3 id="modal-lista-titulo">Cargar lista de precios</h3>

    <div class="form-row">
      <label for="lista-prov-select">Proveedor *</label>
      <select id="lista-prov-select"></select>
    </div>

    <div class="upload-zone">
      <button class="upload-btn" onclick="document.getElementById('lista-input-img').click()">
        <span class="icon-slot" data-icon="camera"></span>

    <input type="file" id="lista-input-img" accept="image/*,application/pdf" style="display:none;" onchange="procesarArchivo(event)">

    <div class="loading-box" id="lista-loading">Procesando...</div>

    <div style="margin-bottom:10px;font-size:13px;color:var(--text-muted);" id="preview-info"></div>

    <div class="preview-tabla" id="preview-tabla" style="display:none;"></div>

    <div class="modal-actions">
      <button class="btn" onclick="cerrarModalLista()">Cancelar</button>
      <button class="btn danger" id="btn-eliminar-lista" onclick="eliminarLista()" style="display:none;">Eliminar</button>
      <button class="btn primary" id="btn-guardar-lista" onclick="guardarLista()" disabled>Guardar</button>
    </div>
  </div>
</div>

<!-- Modal ver lista (con buscador) -->
<div class="modal-overlay modal-lg" id="modal-ver-lista">
  <div class="modal">
    <h3 id="ver-lista-titulo">Lista de precios</h3>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;" id="ver-lista-fecha"></div>

    <div class="buscador-wrap">
      <span class="icon-slot" data-icon="search"></span>
      <input type="text" class="buscador" id="ver-lista-buscar" placeholder="Buscar producto..." oninput="filtrarVerLista()">
    </div>

    <div class="preview-tabla" id="ver-lista-items"></div>

    <div class="modal-actions">
      <button class="btn" onclick="cerrarVerLista()">Cerrar</button>
    </div>
  </div>

<script>

}
// ============================================================
// CONFIG
// ============================================================
var SUPABASE_URL = 'https://himtrizetvkywrtperqu.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbXRyaXpldHZreXdydHBlcnF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjAxODgsImV4cCI6MjA5NDQzNjE4OH0.MIuFHZmJMxVYZmJ3SXBgKumw9XYLrhNwHNlzfNgKMVs';

var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Estado global
var sesion = null;
var profile = null;
var proveedores = [];
var provEditandoId = null;
var listas = [];
var listaEditandoId = null;  // id del proveedor cuya lista estamos editando
var filasPreview = [];  // [{productoLista, precio}, ...] del preview de la nueva lista
var verListaItems = [];  // items en la modal de ver lista (para filtrar)

// Límites por plan (espejo de la función SQL)
var LIMITES = {
  free:     { proveedores: 3,   consultasIA: 0 },
  pro:      { proveedores: 999, consultasIA: 150 },
  business: { proveedores: 999, consultasIA: 500 }
};

// ============================================================
// HELPERS
// ============================================================
function $(id) { return document.getElementById(id); }

function showToast(msg, tipo) {
  var t = document.createElement('div');
  t.className = 'toast' + (tipo ? ' ' + tipo : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.2s';
    setTimeout(function() { t.remove(); }, 200);
  }, 2500);
}

function toggleMenu() {
  $('menu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.menu-btn') && !e.target.closest('.menu')) {
    $('menu').classList.remove('open');
  }
});

// ============================================================
// AUTH
// ============================================================
async function verificarSesion() {
  try {
    var { data: { session }, error } = await supabase.auth.getSession();
    if (error) throw error;
    if (!session) {
      // No hay sesión -> al login
      window.location.href = '/login.html';
      return false;
    }
    sesion = session;
    return true;
  } catch(e) {
    console.error('verificarSesion', e);
    showToast('Error de autenticación', 'error');
    return false;
  }
}

async function cargarProfile() {
  try {
    var { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', sesion.user.id)
      .single();
    if (error) throw error;
    profile = data;
    return true;
  } catch(e) {
    console.error('cargarProfile', e);
    showToast('No se pudo cargar tu perfil', 'error');
    return false;
  }
}

async function cerrarSesion() {
  if (!confirm('¿Cerrar sesión?')) return;
  try {
    await supabase.auth.signOut();
    window.location.href = '/login.html';
  } catch(e) {
    console.error('logout', e);
  }
}

// ============================================================
// RENDERIZAR HEADER + PLAN BANNER
// ============================================================
function renderHeader() {
  var negocio = profile.nombre_negocio || profile.email || 'Mi negocio';
  var planClass = 'header-plan ' + (profile.plan || 'free');
  var planText = (profile.plan || 'free').toUpperCase();
  ['header-negocio', 'header-negocio-desktop'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.textContent = negocio;
  });
  ['header-plan', 'header-plan-desktop'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) { el.textContent = planText; el.className = planClass; }
  });
}

function renderPlanBanner() {
  var banner = $('plan-banner');
  var txt = $('plan-banner-txt');
  if (profile.plan === 'free') {
    var max = LIMITES.free.proveedores;
    if (proveedores.length >= max) {
      banner.classList.add('warn');
      txt.innerHTML = 'Llegaste al límite del plan <strong>Free</strong> (' + max + ' proveedores). Mejorá a <strong>Pro</strong> para tener ilimitados + asistente IA.';
      banner.style.display = 'flex';
    } else {
      banner.classList.remove('warn');
      txt.innerHTML = 'Plan <strong>Free</strong>: ' + proveedores.length + ' de ' + max + ' proveedores · Sin IA';
      banner.style.display = 'flex';
    }
  } else {
    banner.style.display = 'none';
  }
}

// ============================================================
// PROVEEDORES — CRUD
// ============================================================
async function cargarProveedores() {
  try {
    var { data, error } = await supabase
      .from('proveedores')
      .select('*')
      .order('nombre', { ascending: true });
    if (error) throw error;
    proveedores = data || [];
    renderProveedores();
    renderPlanBanner();
  } catch(e) {
    console.error('cargarProveedores', e);
    showToast('Error al cargar proveedores', 'error');
  }
}

function renderProveedores() {
  $('prov-count').textContent = proveedores.length;
  var cont = $('prov-lista');
  if (proveedores.length === 0) {
    cont.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">' + Icon.box() + '</div>' +
      '<div class="empty-title">No tenés proveedores todavía</div>' +
      '<div class="empty-sub">Empezá agregando uno con el botón "+ Nuevo"</div>' +
      '</div>';
    return;
  }
  var html = '<div class="prov-grid">';
  proveedores.forEach(function(p) {
    var inicial = (p.nombre || '?').charAt(0).toUpperCase();
    var logoStyle = p.logo_url ? 'style="background-image:url(\'' + p.logo_url + '\')"' : '';
    var logoTxt = p.logo_url ? '' : inicial;
    html += '<div class="prov-card">' +
      '<div class="prov-logo" ' + logoStyle + '>' + logoTxt + '</div>' +
      '<div class="prov-info">' +
        '<div class="prov-nombre">' + escapeHtml(p.nombre) + '</div>' +
        (p.telefono ? '<div class="prov-tel">' + Icon.phone({size:12}) + '<span>' + escapeHtml(p.telefono) + '</span></div>' : '') +
      '</div>' +
      '<div class="prov-actions">' +
        '<button class="btn-icon" onclick="editarProveedor(\'' + p.id + '\')" title="Editar">' + Icon.pencil() + '</button>' +
        '<button class="btn-icon" onclick="borrarProveedor(\'' + p.id + '\')" title="Borrar">' + Icon.trash() + '</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  cont.innerHTML = html;
}

function abrirModalProv() {
  // Validar límite del plan
  var limite = LIMITES[profile.plan || 'free'].proveedores;
  if (proveedores.length >= limite) {
    showToast('Llegaste al límite de tu plan. Mejorá para agregar más.', 'error');
    return;
  }
  provEditandoId = null;
  $('modal-prov-titulo').textContent = 'Nuevo proveedor';
  $('prov-nombre').value = '';
  $('prov-telefono').value = '';
  $('modal-prov').classList.add('open');
  setTimeout(function() { $('prov-nombre').focus(); }, 100);
}

function editarProveedor(id) {
  var p = proveedores.find(function(x) { return x.id === id; });
  if (!p) return;
  provEditandoId = id;
  $('modal-prov-titulo').textContent = 'Editar proveedor';
  $('prov-nombre').value = p.nombre || '';
  $('prov-telefono').value = p.telefono || '';
  $('modal-prov').classList.add('open');
}

function cerrarModalProv() {
  $('modal-prov').classList.remove('open');
}

async function guardarProveedor() {
  var nombre = $('prov-nombre').value.trim();
  var tel = $('prov-telefono').value.trim();
  if (!nombre) {
    showToast('El nombre es obligatorio', 'error');
    return;
  }
  var btn = $('btn-guardar-prov');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  try {
    if (provEditandoId) {
      // Update
      var { error } = await supabase
        .from('proveedores')
        .update({ nombre: nombre, telefono: tel || null, actualizado: new Date().toISOString() })
        .eq('id', provEditandoId);
      if (error) throw error;
      showToast('Proveedor actualizado', 'success');
    } else {
      // Insert
      var { error } = await supabase
        .from('proveedores')
        .insert({ user_id: sesion.user.id, nombre: nombre, telefono: tel || null });
      if (error) throw error;
      showToast('Proveedor agregado', 'success');
    }
    cerrarModalProv();
    await cargarProveedores();
  } catch(e) {
    console.error('guardarProveedor', e);
    showToast('Error al guardar: ' + (e.message || ''), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

async function borrarProveedor(id) {
  var p = proveedores.find(function(x) { return x.id === id; });
  if (!p) return;
  if (!confirm('¿Borrar el proveedor "' + p.nombre + '"?\n\nTambién se borran sus listas de precios y snapshots.')) return;
  try {
    var { error } = await supabase
      .from('proveedores')
      .delete()
      .eq('id', id);
    if (error) throw error;
    showToast('Proveedor borrado', 'success');
    await cargarProveedores();
  } catch(e) {
    console.error('borrarProveedor', e);
    showToast('Error al borrar', 'error');
  }
}

// ============================================================
// TABS — Cambiar entre Proveedores / Listas
// ============================================================
function cambiarTab(tab) {
  document.querySelectorAll('.tab-btn, .sidebar-link').forEach(function(b) {
    if (b.dataset.tab) b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-section').forEach(function(s) {
    s.classList.toggle('active', s.id === 'tab-' + tab);
  });
  if (tab === 'listas') {
    cargarListas();
  }
}

// ============================================================
// LISTAS DE PRECIOS — Carga y render
// ============================================================
async function cargarListas() {
  try {
    var { data, error } = await supabase
      .from('listas_precios')
      .select('*')
      .order('fecha_actualizacion', { ascending: false });
    if (error) throw error;
    listas = data || [];
    renderListas();
  } catch(e) {
    console.error('cargarListas', e);
    showToast('Error al cargar listas', 'error');
  }
}

function renderListas() {
  $('listas-count').textContent = listas.length;
  var cont = $('listas-lista');
  if (proveedores.length === 0) {
    cont.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">' + Icon.list() + '</div>' +
      '<div class="empty-title">Primero agregá proveedores</div>' +
      '<div class="empty-sub">Las listas de precios se asocian a un proveedor</div>' +
      '</div>';
    return;
  }
  if (listas.length === 0) {
    cont.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">' + Icon.list() + '</div>' +
      '<div class="empty-title">No cargaste ninguna lista todavía</div>' +
      '<div class="empty-sub">Subí una foto o PDF y la IA extrae los productos sola</div>' +
      '</div>';
    return;
  }
  var html = '';
  listas.forEach(function(l) {
    var prov = proveedores.find(function(p) { return p.id === l.proveedor_id; });
    var provNombre = prov ? prov.nombre : '?';
    var cantItems = (l.items || []).length;
    var fechaStr = new Date(l.fecha_actualizacion).toLocaleDateString('es-AR', { day: 'numeric', month: 'short', year: 'numeric' });
    html += '<div class="lista-card">' +
      '<div class="lista-header">' +
        '<div class="lista-prov">' + escapeHtml(provNombre) + '</div>' +
        '<span class="lista-items-count">' + cantItems + ' items</span>' +
      '</div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">' +
        '<div class="lista-meta">Actualizada ' + fechaStr + '</div>' +
        '<div style="display:flex;gap:4px;">' +
          '<button class="btn-icon" onclick="abrirVerLista(\'' + l.proveedor_id + '\')" title="Ver">' + Icon.eye() + '</button>' +
          '<button class="btn-icon" onclick="abrirModalLista(\'' + l.proveedor_id + '\')" title="Editar">' + Icon.pencil() + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  cont.innerHTML = html;
}

// ============================================================
// MODAL: cargar/editar lista
// ============================================================
function abrirModalLista(proveedorId) {
  if (proveedores.length === 0) {
    showToast('Primero agregá un proveedor', 'error');
    return;
  }

  // Plan free: máximo 1 lista. Si ya tiene una y no está editando esa misma, bloquear
  if (profile.plan === 'free') {
    var yaEditandoEsta = proveedorId && listas.some(function(l) { return l.proveedor_id === proveedorId; });
    if (listas.length >= 1 && !yaEditandoEsta) {
      showToast('El plan Free permite 1 lista. Mejorá a Pro para cargar más.', 'error');
      return;
    }
  }

  listaEditandoId = proveedorId || null;
  filasPreview = [];

  // Llenar select de proveedores
  var sel = $('lista-prov-select');
  sel.innerHTML = '';
  proveedores.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.nombre;
    sel.appendChild(opt);
  });

  if (proveedorId) {
    // Modo edición: cargar lista existente
    var lista = listas.find(function(l) { return l.proveedor_id === proveedorId; });
    if (lista) {
      sel.value = proveedorId;
      sel.disabled = true;
      filasPreview = (lista.items || []).map(function(it) {
        return { productoLista: it.productoLista, precio: parseFloat(it.precio) };
      });
      $('modal-lista-titulo').textContent = 'Editar lista de precios';
      $('btn-eliminar-lista').style.display = 'inline-flex';
      renderPreview();
    }
  } else {
    sel.disabled = false;
    $('modal-lista-titulo').textContent = 'Cargar lista de precios';
    $('btn-eliminar-lista').style.display = 'none';
    $('preview-tabla').style.display = 'none';
    $('preview-info').textContent = '';
    $('btn-guardar-lista').disabled = true;
  }

  $('lista-loading').style.display = 'none';
  $('modal-lista').classList.add('open');
}

function cerrarModalLista() {
  $('modal-lista').classList.remove('open');
  $('lista-input-img').value = '';
  filasPreview = [];
  listaEditandoId = null;
}

// ============================================================
// Procesar archivo con IA (foto o PDF)
// ============================================================
function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function() { resolve(r.result.split(',')[1]); };
    r.onerror = function() { reject(new Error('No se pudo leer el archivo')); };
    r.readAsDataURL(file);
  });
}

// Recupera items aunque la IA haya devuelto JSON truncado
// Busca pares {"nombre":"...", "precio":NUM} en cualquier lugar del texto
function recuperarItemsTruncados(texto) {
  var items = [];
  // Regex que matchea: {"nombre": "...", "precio": 1234.56}
  var re = /\{\s*"nombre"\s*:\s*"([^"]+)"\s*,\s*"precio"\s*:\s*([\d.]+)\s*\}/g;
  var m;
  while ((m = re.exec(texto)) !== null) {
    var precio = parseFloat(m[2]);
    if (!isNaN(precio) && precio > 0) {
      items.push({ nombre: m[1], precio: precio });
    }
  }
  console.log('[IA] Recuperados ' + items.length + ' items del JSON truncado');
  return items;
}

async function procesarArchivo(event) {
  var file = event.target.files[0];
  if (!file) return;

  // Validar tamaño (max 20 MB)
  var maxBytes = 20 * 1024 * 1024;
  if (file.size > maxBytes) {
    showToast('El archivo es muy grande (máx 20 MB).', 'error');
    event.target.value = '';
    return;
  }

  // Validar límite del plan free ANTES de procesar
  if (profile.plan === 'free') {
    // Si ya tiene una lista y NO está editando esa misma, bloquear
    var proveedorElegido = $('lista-prov-select').value;
    var listaExistenteEseProv = listas.find(function(l) { return l.proveedor_id === proveedorElegido; });
    if (listas.length >= 1 && !listaExistenteEseProv) {
      showToast('El plan Free permite 1 lista. Mejorá a Pro para listas ilimitadas.', 'error');
      event.target.value = '';
      return;
    }
  }

  var esPDF = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);

  try {
    if (esPDF) {
      await procesarPDF(file);
    } else {
      await procesarImagen(file);
    }
  } catch(e) {
    console.error('procesarArchivo error:', e);
    $('lista-loading').style.display = 'none';
    showToast('Error: ' + (e.message || 'no se pudo procesar'), 'error');
  } finally {
    event.target.value = '';
  }
}

async function procesarImagen(file) {
  var tiposValidos = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
  var mimeType = file.type || 'image/jpeg';
  if (mimeType === 'image/jpg') mimeType = 'image/jpeg';
  if (tiposValidos.indexOf(mimeType) < 0) {
    throw new Error('Tipo de imagen no soportado. Usá JPG, PNG, GIF o WEBP.');
  }

  var loading = $('lista-loading');
  loading.textContent = 'Procesando imagen con IA... (15-30 seg)';
  loading.style.display = 'block';
  $('btn-guardar-lista').disabled = true;

  var base64 = await fileToBase64(file);
  var proveedorId = $('lista-prov-select').value;
  var prompt = 'Esta imagen es una lista de precios de un proveedor. Extrae cada producto con su precio.\n\nFORMATO DE RESPUESTA OBLIGATORIO:\n- Tu respuesta debe ser ÚNICAMENTE un array JSON válido.\n- Empezá con [ y terminá con ]\n- NO incluyas texto explicativo antes ni después.\n- NO uses markdown ni bloques de código.\n- Cada elemento debe tener exactamente: {"nombre": "...", "precio": numero}\n- Mantené nombres COMPLETOS (marca, presentación, tamaño del envase)\n- precio es número con punto decimal: 9644.07\n- Ignorá encabezados, totales, fechas y filas que no sean productos';

  var items = await llamarClaudeProcesarLista({
    tipo: 'procesar_lista',
    max_tokens: 16000,
    proveedor_id: proveedorId,
    messages: [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
        { type: 'text', text: prompt }
      ]
    }]
  });

  filasPreview = items
    .filter(function(it) { return it.nombre && it.precio > 0; })
    .map(function(it) {
      return { productoLista: String(it.nombre).trim(), precio: parseFloat(it.precio) };
    });

  loading.style.display = 'none';
  if (filasPreview.length === 0) {
    showToast('No se detectaron productos. Probá con una foto de mejor calidad', 'error');
    return;
  }
  renderPreview();
  showToast('IA extrajo ' + filasPreview.length + ' productos');
}

// ============================================================
// PROCESAR PDF: extraer texto local → detectar columnas → chunks
// ============================================================
async function procesarPDF(file) {
  if (typeof pdfjsLib === 'undefined') {
    throw new Error('PDF.js no cargó. Recargá la página.');
  }
  var loading = $('lista-loading');
  loading.textContent = 'Extrayendo texto del PDF...';
  loading.style.display = 'block';

  // 1. Extraer texto del PDF localmente (sin IA)
  var buffer = await file.arrayBuffer();
  var pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  var lineas = [];
  for (var i = 1; i <= pdf.numPages; i++) {
    loading.textContent = 'Leyendo página ' + i + ' de ' + pdf.numPages + '...';
    var page = await pdf.getPage(i);
    var tc = await page.getTextContent();
    var lineasPag = {};
    tc.items.forEach(function(it) {
      var y = Math.round(it.transform[5]);
      if (!lineasPag[y]) lineasPag[y] = [];
      lineasPag[y].push({ x: it.transform[4], texto: it.str });
    });
    Object.keys(lineasPag).sort(function(a, b) { return parseInt(b) - parseInt(a); }).forEach(function(y) {
      var partes = lineasPag[y].sort(function(a, b) { return a.x - b.x; }).map(function(p) { return p.texto; });
      var linea = partes.join(' ').trim();
      if (linea) lineas.push(linea);
    });
  }

  if (!lineas.length) {
    throw new Error('El PDF no tiene texto extraíble. Si es escaneado, probá subir como imagen.');
  }
  console.log('[PDF] Líneas extraídas:', lineas.length);

  // 2. Detectar columnas con IA usando una muestra
  loading.textContent = 'Detectando columnas de precio...';
  var muestra = lineas.slice(0, 60).join('\n');
  var columnas = await detectarColumnasPDF(muestra);

  if (!columnas || !columnas.precios || !columnas.precios.length) {
    throw new Error('No se detectaron columnas de precio en el PDF');
  }

  // 3. Si hay UNA columna sola, procesar directo. Si hay varias, mostrar selector
  if (columnas.precios.length === 1) {
    await procesarPDFConColumna(lineas, columnas.precios[0].nombre);
  } else {
    loading.style.display = 'none';
    mostrarSelectorColumnasPDF(lineas, columnas);
  }
}

async function detectarColumnasPDF(muestraTexto) {
  var prompt = 'Mirá esta muestra de una lista de precios. Identificá las columnas que parecen ser PRECIOS (puede haber varias: precio lista, precio con descuento, precio mayorista, etc).\n\nDevolvé EXCLUSIVAMENTE un JSON con este formato:\n{"precios":[{"nombre":"nombre/encabezado de la columna","ejemplo":"valor de ejemplo"}, ...]}\n\nIMPORTANTE: solo columnas de PRECIO (números monetarios). No incluyas códigos, cantidades de stock, ni descripciones.\n\nMuestra:\n\n' + muestraTexto;
  var proveedorId = $('lista-prov-select').value;
  var resp = await fetch('/api/claude', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + sesion.access_token
    },
    body: JSON.stringify({
      tipo: 'detectar_columnas',
      max_tokens: 1000,
      proveedor_id: proveedorId,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  var data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'Error detectando columnas');
  var texto = (data.content && data.content[0] && data.content[0].text || '').replace(/```json|```/g, '').trim();
  try { return JSON.parse(texto); }
  catch(e) {
    var ini = texto.indexOf('{'), fin = texto.lastIndexOf('}');
    if (ini >= 0 && fin > ini) return JSON.parse(texto.slice(ini, fin + 1));
    throw new Error('La IA respondió mal formato al detectar columnas');
  }
}

      '<div style="flex:1;min-width:0;">' +

      (c.ejemplo ? '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">ej: ' + escapeHtml(c.ejemplo) + '</div>' : '') +
      '</div></label>';
  }).join('');
  var modalHtml = '<div class="modal-overlay open" id="col-pdf-modal" style="z-index:600;">' +

    opciones +

}

function cerrarModalColPDF() {
  var m = document.getElementById('col-pdf-modal');
  if (m) m.remove();
}

async function procesarPDFConColumna(lineas, nombreColumna) {
  var loading = $('lista-loading');
  loading.style.display = 'block';
  filasPreview = [];
  var chunkSize = 200;
  var totalChunks = Math.ceil(lineas.length / chunkSize);
  for (var c = 0; c < totalChunks; c++) {
    loading.textContent = 'IA procesando parte ' + (c + 1) + ' de ' + totalChunks + '...';
    var chunkLineas = lineas.slice(c * chunkSize, (c + 1) * chunkSize);
    var chunkTexto = chunkLineas.join('\n');
    try {
      var items = await extraerChunkConClaude(chunkTexto, nombreColumna);
      items.forEach(function(it) {
        if (it.nombre && it.precio > 0) {
          filasPreview.push({ productoLista: String(it.nombre).trim(), precio: parseFloat(it.precio) });
        }
      });
      // Render incremental para que el usuario vea progreso
      renderPreview();
    } catch(chunkErr) {
      console.error('[PDF] Chunk', c + 1, 'falló:', chunkErr.message);
      // Continuar con los siguientes chunks aunque uno falle
    }
  }
  loading.style.display = 'none';
  if (filasPreview.length === 0) {
    showToast('No se pudieron extraer productos', 'error');
    return;
  }
  showToast('IA extrajo ' + filasPreview.length + ' productos');
}

async function extraerChunkConClaude(textoCrudo, nombreColumna) {
  if (textoCrudo.length > 30000) textoCrudo = textoCrudo.slice(0, 30000) + '...';
  var prompt = 'Texto crudo de una lista de precios. Hay varias columnas de precios; tu tarea es extraer el nombre del producto y EL PRECIO QUE CORRESPONDE A LA COLUMNA "' + nombreColumna + '".\n\nDevolvé EXCLUSIVAMENTE un array JSON, sin texto adicional:\n[{"nombre":"...","precio":numero}, ...]\n\n- Mantené nombres COMPLETOS (marca, presentación, tamaño)\n- precio es solo número con punto decimal (ej: 9644.07)\n- Ignorá encabezados, totales y filas que no sean productos\n- Si una línea tiene varios productos juntos, separalos\n\nTexto:\n\n' + textoCrudo;
  var proveedorId = $('lista-prov-select').value;
  var resp = await fetch('/api/claude', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + sesion.access_token
    },
    body: JSON.stringify({
      tipo: 'procesar_chunk',
      max_tokens: 8000,
      proveedor_id: proveedorId,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  var data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'Error');
  var texto = (data.content && data.content[0] && data.content[0].text || '').replace(/```json|```/g, '').trim();
  try {
    var arr = JSON.parse(texto);
    if (!Array.isArray(arr)) throw new Error('No es array');
    return arr;
  } catch(e) {
    // Intentar extraer array de adentro
    var ini = texto.indexOf('['), fin = texto.lastIndexOf(']');
    if (ini >= 0 && fin > ini) {
      try { return JSON.parse(texto.slice(ini, fin + 1)); } catch(e2) {}
    }
    // Último recurso: recuperar items con regex
    return recuperarItemsTruncados(texto).map(function(it) {
      return { nombre: it.nombre, precio: it.precio };
    });
  }
}

// ============================================================
// Helper genérico para llamar a Claude y parsear array
// ============================================================
async function llamarClaudeProcesarLista(payload) {
  var resp = await fetch('/api/claude', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + sesion.access_token
    },
    body: JSON.stringify(payload)
  });
  var data = await resp.json();
  if (!resp.ok) {
    throw new Error(data.error || 'Error desconocido');
  }
  var texto = data.content && data.content[0] && data.content[0].text || '';
  console.log('[IA] Respuesta length:', texto.length);
  console.log('[IA] Usage:', data.usage);
  texto = texto.replace(/```json|```/g, '').trim();

  var items = null;
  try {
    items = JSON.parse(texto);
  } catch(e1) {
    var ini = texto.indexOf('[');
    var fin = texto.lastIndexOf(']');
    if (ini >= 0 && fin > ini) {
      try { items = JSON.parse(texto.slice(ini, fin + 1)); } catch(e2) {}
    }
    if (!items) {
      items = recuperarItemsTruncados(texto);
    }
  }
  if (!Array.isArray(items) || items.length === 0) {
    var respCorta = texto.slice(0, 200);
    throw new Error('La IA respondió pero no se pudo extraer: "' + respCorta + '..."');
  }
  return items;
}

function renderPreview() {
  var tabla = $('preview-tabla');
  if (filasPreview.length === 0) {
    tabla.style.display = 'none';
    $('preview-info').textContent = '';
    $('btn-guardar-lista').disabled = true;
    return;
  }
  $('preview-info').textContent = 'Revisá y editá si hace falta. Después tocá "Guardar".';
  var html = '';
  filasPreview.forEach(function(it, idx) {
    html += '<div class="preview-fila">' +
      '<input type="text" class="nombre" value="' + escapeHtmlAttr(it.productoLista) + '" oninput="editarFilaPreview(' + idx + ', this.value, null)">' +
      '<input type="number" step="0.01" class="precio" value="' + it.precio + '" oninput="editarFilaPreview(' + idx + ', null, this.value)">' +
      '<button class="btn-icon" onclick="borrarFilaPreview(' + idx + ')" title="Borrar">' + Icon.trash() + '</button>' +
    '</div>';
  });
  tabla.innerHTML = html;
  tabla.style.display = 'block';
  $('btn-guardar-lista').disabled = false;
}

function editarFilaPreview(idx, nombre, precio) {
  if (nombre !== null) filasPreview[idx].productoLista = nombre;
  if (precio !== null) {
    var p = parseFloat(precio);
    filasPreview[idx].precio = isNaN(p) ? 0 : p;
  }
}

function borrarFilaPreview(idx) {
  filasPreview.splice(idx, 1);
  renderPreview();
}

// ============================================================
// Guardar lista (con snapshot de la versión anterior)
// ============================================================
async function guardarLista() {
  var proveedorId = $('lista-prov-select').value;
  if (!proveedorId) {
    showToast('Seleccioná un proveedor', 'error');
    return;
  }
  // Filtrar filas válidas
  var items = filasPreview.filter(function(it) {
    return it.productoLista && it.productoLista.trim() && it.precio > 0;
  });
  if (items.length === 0) {
    showToast('No hay items válidos para guardar', 'error');
    return;
  }

  var btn = $('btn-guardar-lista');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    // 1) Si ya existe una lista para este proveedor, hacer snapshot de la anterior
    var listaExistente = listas.find(function(l) { return l.proveedor_id === proveedorId; });
    if (listaExistente && listaExistente.items && listaExistente.items.length > 0) {
      var { error: snapError } = await supabase
        .from('snapshots_precios')
        .insert({
          user_id: sesion.user.id,
          proveedor_id: proveedorId,
          items: listaExistente.items
        });
      if (snapError) console.error('Error guardando snapshot:', snapError);
    }

    // 2) Upsert de la lista (insert si no existe, update si existe)
    if (listaExistente) {
      var { error } = await supabase
        .from('listas_precios')
        .update({
          items: items,
          fecha_actualizacion: new Date().toISOString()
        })
        .eq('id', listaExistente.id);
      if (error) throw error;
    } else {
      var { error } = await supabase
        .from('listas_precios')
        .insert({
          user_id: sesion.user.id,
          proveedor_id: proveedorId,
          items: items
        });
      if (error) throw error;
    }

    showToast('Lista guardada (' + items.length + ' items)', 'success');
    cerrarModalLista();
    await cargarListas();
  } catch(e) {
    console.error('guardarLista', e);
    showToast('Error al guardar: ' + (e.message || ''), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

function renderVerLista(items) {
  var cont = $('ver-lista-items');
  if (items.length === 0) {
    cont.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:13px;">Sin resultados</div>';
    return;
  }
  var html = '';
  items.forEach(function(it) {
    html += '<div class="preview-fila" style="cursor:default;">' +
      '<div style="flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(it.productoLista) + '</div>' +
      '<div style="font-size:13px;font-weight:600;color:var(--success);white-space:nowrap;font-variant-numeric:tabular-nums;">' + formatPrecio(it.precio) + '</div>' +
    '</div>';
  });
  cont.innerHTML = html;
}

function formatPrecio(n) {
  if (isNaN(n)) return '$0';
  var num = parseFloat(n);
  var s = num.toFixed(2);
  var parts = s.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return '$' + parts.join(',');
}

function escapeHtmlAttr(s) {
  if (s == null) return '';
  return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/&/g, '&amp;');
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

  }
  if (e.key === 'Escape') {
    if ($('modal-prov').classList.contains('open')) cerrarModalProv();
    if ($('modal-lista').classList.contains('open')) cerrarModalLista();
    if ($('modal-ver-lista').classList.contains('open')) cerrarVerLista();
  }
});
</script>

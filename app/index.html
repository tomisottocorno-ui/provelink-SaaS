<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ProveLink</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #161616;
    --bg-elev2: #1f1f1f;
    --bg-elev3: #2a2a2a;
    --border: #2a2a2a;
    --text: #ededed;
    --text-muted: #888;
    --accent: #4ade80;
    --accent-hover: #22c55e;
    --danger: #ef4444;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Loader inicial ===== */
  .loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--bg-elev2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Header ===== */
  .header {
    position: sticky;
    top: 0;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .header-logo {
    font-size: 22px;
  }
  .header-titulos {
    min-width: 0;
  }
  .header-negocio {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }
  .header-plan {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .header-plan.pro { color: var(--accent); }
  .header-plan.business { color: #fbbf24; }
  .menu-btn {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== Menú desplegable ===== */
  .menu {
    position: absolute;
    top: 56px;
    right: 16px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    min-width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
  }
  .menu.open { display: block; }
  .menu-item {
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .menu-item:hover { background: var(--bg-elev2); }
  .menu-item.danger { color: var(--danger); }
  .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ===== Contenido principal ===== */
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 100px;
  }

  .seccion-titulo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 12px;
  }
  .seccion-titulo h2 {
    font-size: 18px;
    font-weight: 600;
  }
  .badge {
    background: var(--bg-elev2);
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 500;
  }
  .badge.warn { background: #2d2010; color: var(--warn); }

  /* ===== Botones ===== */
  .btn {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 9px;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-elev3); }
  .btn.primary {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.danger {
    background: transparent;
    color: var(--danger);
    border-color: #5a2828;
  }
  .btn.danger:hover { background: #2d1414; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-icon {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    font-size: 16px;
  }
  .btn-icon:hover { background: var(--bg-elev2); color: var(--text); }

  /* ===== Lista de proveedores ===== */
  .prov-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .prov-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .prov-logo {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--bg-elev2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
  }
  .prov-info { flex: 1; min-width: 0; }
  .prov-nombre {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .prov-tel {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .prov-actions {
    display: flex;
    gap: 4px;
  }

  /* ===== Empty state ===== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .empty-sub { font-size: 13px; margin-bottom: 20px; }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 500;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 700px;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
  }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 16px; border: 1px solid var(--border); }
  }
  .modal h3 {
    font-size: 18px;
    margin-bottom: 16px;
  }
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .form-row input[type="text"],
  .form-row input[type="tel"],
  .form-row input[type="email"] {
    width: 100%;
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 9px;
    font-size: 15px;
    outline: none;
  }
  .form-row input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    box-shadow: 0 6px 16px rgba(0,0,0,0.5);
    animation: toastIn 0.2s ease;
  }
  .toast.success { border-color: var(--accent); }
  .toast.error { border-color: var(--danger); color: #fca5a5; }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ===== Plan banner ===== */
  .plan-banner {
    background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .plan-banner.warn {
    background: linear-gradient(135deg, #2d2010 0%, #3a2a14 100%);
    border-color: #5a401c;
  }
  .plan-banner-txt {
    font-size: 13px;
    color: var(--text-muted);
  }
  .plan-banner-txt strong { color: var(--text); }
</style>
</head>
<body>

<!-- Loader inicial mientras verifica sesión -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<!-- Header -->
<div class="header" id="header" style="display:none;">
  <div class="header-left">
    <div class="header-logo">📦</div>
    <div class="header-titulos">
      <div class="header-negocio" id="header-negocio">—</div>
      <div class="header-plan" id="header-plan">FREE</div>
    </div>
  </div>
  <button class="menu-btn" onclick="toggleMenu()">⋮</button>
</div>

<!-- Menú -->
<div class="menu" id="menu">
  <div class="menu-item" onclick="abrirPlanes()">⭐ Cambiar plan</div>
  <div class="menu-item" onclick="abrirConfig()">⚙️ Configuración</div>
  <div class="menu-divider"></div>
  <div class="menu-item danger" onclick="cerrarSesion()">🚪 Cerrar sesión</div>
</div>

<!-- Contenido -->
<div class="container" id="app" style="display:none;">

  <!-- Banner del plan -->
  <div class="plan-banner" id="plan-banner" style="display:none;">
    <div class="plan-banner-txt" id="plan-banner-txt"></div>
    <button class="btn primary" onclick="abrirPlanes()">Mejorar</button>
  </div>

  <!-- Proveedores -->
  <div class="seccion-titulo">
    <h2>Proveedores <span class="badge" id="prov-count">0</span></h2>
    <button class="btn primary" onclick="abrirModalProv()">+ Nuevo</button>
  </div>

  <div id="prov-lista">
    <div class="empty">
      <div class="empty-emoji">📦</div>
      <div class="empty-title">Cargando...</div>
    </div>
  </div>

</div>

<!-- Modal nuevo/editar proveedor -->
<div class="modal-overlay" id="modal-prov">
  <div class="modal">
    <h3 id="modal-prov-titulo">Nuevo proveedor</h3>

    <div class="form-row">
      <label for="prov-nombre">Nombre *</label>
      <input type="text" id="prov-nombre" placeholder="Ej: Distribuidora La Estrella">
    </div>

    <div class="form-row">
      <label for="prov-telefono">Teléfono (opcional)</label>
      <input type="tel" id="prov-telefono" placeholder="Ej: 11 1234 5678">
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="cerrarModalProv()">Cancelar</button>
      <button class="btn primary" id="btn-guardar-prov" onclick="guardarProveedor()">Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIG
// ============================================================
var SUPABASE_URL = 'https://himtrizetvkywrtperqu.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbXRyaXpldHZreXdydHBlcnF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjAxODgsImV4cCI6MjA5NDQzNjE4OH0.MIuFHZmJMxVYZmJ3SXBgKumw9XYLrhNwHNlzfNgKMVs';

var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Estado global
var sesion = null;
var profile = null;
var proveedores = [];
var provEditandoId = null;

// Límites por plan (espejo de la función SQL)
var LIMITES = {
  free:     { proveedores: 3,   consultasIA: 0 },
  pro:      { proveedores: 999, consultasIA: 150 },
  business: { proveedores: 999, consultasIA: 500 }
};

// ============================================================
// HELPERS
// ============================================================
function $(id) { return document.getElementById(id); }

function showToast(msg, tipo) {
  var t = document.createElement('div');
  t.className = 'toast' + (tipo ? ' ' + tipo : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.2s';
    setTimeout(function() { t.remove(); }, 200);
  }, 2500);
}

function toggleMenu() {
  $('menu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.menu-btn') && !e.target.closest('.menu')) {
    $('menu').classList.remove('open');
  }
});

// ============================================================
// AUTH
// ============================================================
async function verificarSesion() {
  try {
    var { data: { session }, error } = await supabase.auth.getSession();
    if (error) throw error;
    if (!session) {
      // No hay sesión -> al login
      window.location.href = '/login.html';
      return false;
    }
    sesion = session;
    return true;
  } catch(e) {
    console.error('verificarSesion', e);
    showToast('Error de autenticación', 'error');
    return false;
  }
}

async function cargarProfile() {
  try {
    var { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', sesion.user.id)
      .single();
    if (error) throw error;
    profile = data;
    return true;
  } catch(e) {
    console.error('cargarProfile', e);
    showToast('No se pudo cargar tu perfil', 'error');
    return false;
  }
}

async function cerrarSesion() {
  if (!confirm('¿Cerrar sesión?')) return;
  try {
    await supabase.auth.signOut();
    window.location.href = '/login.html';
  } catch(e) {
    console.error('logout', e);
  }
}

// ============================================================
// RENDERIZAR HEADER + PLAN BANNER
// ============================================================
function renderHeader() {
  $('header-negocio').textContent = profile.nombre_negocio || profile.email || 'Mi negocio';
  var planEl = $('header-plan');
  planEl.textContent = (profile.plan || 'free').toUpperCase();
  planEl.className = 'header-plan ' + (profile.plan || 'free');
}

function renderPlanBanner() {
  var banner = $('plan-banner');
  var txt = $('plan-banner-txt');
  if (profile.plan === 'free') {
    var max = LIMITES.free.proveedores;
    if (proveedores.length >= max) {
      banner.classList.add('warn');
      txt.innerHTML = 'Llegaste al límite del plan <strong>Free</strong> (' + max + ' proveedores). Mejorá a <strong>Pro</strong> para tener ilimitados + asistente IA.';
      banner.style.display = 'flex';
    } else {
      banner.classList.remove('warn');
      txt.innerHTML = 'Plan <strong>Free</strong>: ' + proveedores.length + ' de ' + max + ' proveedores · Sin IA';
      banner.style.display = 'flex';
    }
  } else {
    banner.style.display = 'none';
  }
}

// ============================================================
// PROVEEDORES — CRUD
// ============================================================
async function cargarProveedores() {
  try {
    var { data, error } = await supabase
      .from('proveedores')
      .select('*')
      .order('nombre', { ascending: true });
    if (error) throw error;
    proveedores = data || [];
    renderProveedores();
    renderPlanBanner();
  } catch(e) {
    console.error('cargarProveedores', e);
    showToast('Error al cargar proveedores', 'error');
  }
}

function renderProveedores() {
  $('prov-count').textContent = proveedores.length;
  var cont = $('prov-lista');
  if (proveedores.length === 0) {
    cont.innerHTML = '<div class="empty">' +
      '<div class="empty-emoji">📦</div>' +
      '<div class="empty-title">No tenés proveedores todavía</div>' +
      '<div class="empty-sub">Empezá agregando uno con el botón "+ Nuevo"</div>' +
      '</div>';
    return;
  }
  var html = '<div class="prov-grid">';
  proveedores.forEach(function(p) {
    var inicial = (p.nombre || '?').charAt(0).toUpperCase();
    var logoStyle = p.logo_url ? 'style="background-image:url(\'' + p.logo_url + '\')"' : '';
    var logoTxt = p.logo_url ? '' : inicial;
    html += '<div class="prov-card">' +
      '<div class="prov-logo" ' + logoStyle + '>' + logoTxt + '</div>' +
      '<div class="prov-info">' +
        '<div class="prov-nombre">' + escapeHtml(p.nombre) + '</div>' +
        (p.telefono ? '<div class="prov-tel">📞 ' + escapeHtml(p.telefono) + '</div>' : '') +
      '</div>' +
      '<div class="prov-actions">' +
        '<button class="btn-icon" onclick="editarProveedor(\'' + p.id + '\')" title="Editar">✏️</button>' +
        '<button class="btn-icon" onclick="borrarProveedor(\'' + p.id + '\')" title="Borrar">🗑️</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  cont.innerHTML = html;
}

function abrirModalProv() {
  // Validar límite del plan
  var limite = LIMITES[profile.plan || 'free'].proveedores;
  if (proveedores.length >= limite) {
    showToast('Llegaste al límite de tu plan. Mejorá para agregar más.', 'error');
    return;
  }
  provEditandoId = null;
  $('modal-prov-titulo').textContent = 'Nuevo proveedor';
  $('prov-nombre').value = '';
  $('prov-telefono').value = '';
  $('modal-prov').classList.add('open');
  setTimeout(function() { $('prov-nombre').focus(); }, 100);
}

function editarProveedor(id) {
  var p = proveedores.find(function(x) { return x.id === id; });
  if (!p) return;
  provEditandoId = id;
  $('modal-prov-titulo').textContent = 'Editar proveedor';
  $('prov-nombre').value = p.nombre || '';
  $('prov-telefono').value = p.telefono || '';
  $('modal-prov').classList.add('open');
}

function cerrarModalProv() {
  $('modal-prov').classList.remove('open');
}

async function guardarProveedor() {
  var nombre = $('prov-nombre').value.trim();
  var tel = $('prov-telefono').value.trim();
  if (!nombre) {
    showToast('El nombre es obligatorio', 'error');
    return;
  }
  var btn = $('btn-guardar-prov');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  try {
    if (provEditandoId) {
      // Update
      var { error } = await supabase
        .from('proveedores')
        .update({ nombre: nombre, telefono: tel || null, actualizado: new Date().toISOString() })
        .eq('id', provEditandoId);
      if (error) throw error;
      showToast('Proveedor actualizado', 'success');
    } else {
      // Insert
      var { error } = await supabase
        .from('proveedores')
        .insert({ user_id: sesion.user.id, nombre: nombre, telefono: tel || null });
      if (error) throw error;
      showToast('Proveedor agregado', 'success');
    }
    cerrarModalProv();
    await cargarProveedores();
  } catch(e) {
    console.error('guardarProveedor', e);
    showToast('Error al guardar: ' + (e.message || ''), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

async function borrarProveedor(id) {
  var p = proveedores.find(function(x) { return x.id === id; });
  if (!p) return;
  if (!confirm('¿Borrar el proveedor "' + p.nombre + '"?\n\nTambién se borran sus listas de precios y snapshots.')) return;
  try {
    var { error } = await supabase
      .from('proveedores')
      .delete()
      .eq('id', id);
    if (error) throw error;
    showToast('Proveedor borrado', 'success');
    await cargarProveedores();
  } catch(e) {
    console.error('borrarProveedor', e);
    showToast('Error al borrar', 'error');
  }
}

// ============================================================
// PLACEHOLDERS para features futuras
// ============================================================
function abrirPlanes() {
  showToast('Página de planes próximamente');
}
function abrirConfig() {
  showToast('Configuración próximamente');
}

// ============================================================
// UTILS
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

// ============================================================
// INIT
// ============================================================
(async function init() {
  var ok = await verificarSesion();
  if (!ok) return;
  ok = await cargarProfile();
  if (!ok) return;
  renderHeader();
  await cargarProveedores();
  $('loader').style.display = 'none';
  $('header').style.display = 'flex';
  $('app').style.display = 'block';
})();

// Enter en el modal para guardar
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && $('modal-prov').classList.contains('open')) {
    if (document.activeElement.tagName === 'INPUT') {
      guardarProveedor();
    }
  }
  if (e.key === 'Escape' && $('modal-prov').classList.contains('open')) {
    cerrarModalProv();
  }
});
</script>

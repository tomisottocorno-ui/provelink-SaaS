<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ProveLink — Ingresar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22white%22><rect width=%2224%22 height=%2224%22 rx=%226%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/app/styles.css">
<script src="/app/icons.js"></script>
</head>
<body class="auth-body">

<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-mark"><img src="/imagenes/logo.png" alt="ProveLink" class="logo-img"></div>
    <div class="auth-logo-name">ProveLink</div>
    <div class="auth-logo-sub">Gestioná tus proveedores fácil</div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="cambiarTab('login')">Ingresar</div>
      <div class="auth-tab" id="tab-registro" onclick="cambiarTab('registro')">Crear cuenta</div>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" autocomplete="email" placeholder="tu@email.com">

      <label for="login-pass">Contraseña</label>
      <input type="password" id="login-pass" autocomplete="current-password">

      <button class="primary" id="btn-login" onclick="hacerLogin()">Ingresar</button>

      <div class="error" id="login-error"></div>

      <div class="auth-link">
        <a onclick="recuperar()">¿Olvidaste tu contraseña?</a>
      </div>
    </div>

    <!-- REGISTRO -->
    <div id="form-registro" class="hide">
      <label for="reg-negocio">Nombre del negocio</label>
      <input type="text" id="reg-negocio" placeholder="Ej: Panadería La Esquina">

      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" autocomplete="email" placeholder="tu@email.com">

      <label for="reg-pass">Contraseña (mín 6 caracteres)</label>
      <input type="password" id="reg-pass" autocomplete="new-password">

      <button class="primary" id="btn-registro" onclick="hacerRegistro()">Crear cuenta gratis</button>

      <div class="error" id="reg-error"></div>
      <div class="success" id="reg-success"></div>
    </div>

    <!-- RECOVERY: nueva contraseña tras el link del mail -->
    <div id="form-recovery" class="hide">
      <div style="text-align:center;margin-bottom:18px;font-size:14px;color:#94a3b8;">
        🔑 Ingresá tu nueva contraseña
      </div>
      <label for="rec-pass">Nueva contraseña</label>
      <input type="password" id="rec-pass" autocomplete="new-password" placeholder="Mínimo 6 caracteres">

      <label for="rec-pass2" style="margin-top:12px;">Confirmar contraseña</label>
      <input type="password" id="rec-pass2" autocomplete="new-password" placeholder="Repetí la contraseña">

      <button class="primary" id="btn-recovery" onclick="hacerCambioContrasenia()" style="margin-top:18px;">Guardar nueva contraseña</button>

      <div class="error" id="rec-error"></div>
      <div class="success" id="rec-success"></div>
    </div>
  </div>
</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // =========================================================
  // CONFIG — Reemplazar estas dos líneas con tus credenciales
  // =========================================================
  var SUPABASE_URL = 'https://himtrizetvkywrtperqu.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpbXRyaXpldHZreXdydHBlcnF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjAxODgsImV4cCI6MjA5NDQzNjE4OH0.MIuFHZmJMxVYZmJ3SXBgKumw9XYLrhNwHNlzfNgKMVs';

  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Detectar si es redirect de recovery ANTES de chequear sesión
  var esRecovery = (function() {
    try {
      var h = window.location.hash.replace('#', '');
      var p = new URLSearchParams(h);
      return p.get('type') === 'recovery';
    } catch(e) { return false; }
  })();

  // Si ya hay sesión activa (y no es un recovery), redirigir a la app
  (async function() {
    try {
      if (esRecovery) return; // dejar que onAuthStateChange lo maneje
      var { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = '/app';
      }
    } catch(e) { console.error('check session', e); }
  })();

  // Detectar evento de recovery de contraseña
  supabase.auth.onAuthStateChange(function(event, session) {
    if (event === 'PASSWORD_RECOVERY') {
      mostrarModo('recovery');
    }
  });

  function mostrarModo(modo) {
    // Ocultar / mostrar tabs según modo
    var tabs = document.querySelector('.auth-tabs');
    if (tabs) tabs.style.display = modo === 'recovery' ? 'none' : '';
    // Mostrar/ocultar formularios
    document.getElementById('form-login').classList.toggle('hide', modo !== 'login');
    document.getElementById('form-registro').classList.toggle('hide', modo !== 'registro');
    document.getElementById('form-recovery').classList.toggle('hide', modo !== 'recovery');
    // Tabs activos
    if (modo !== 'recovery') {
      document.getElementById('tab-login').classList.toggle('active', modo === 'login');
      document.getElementById('tab-registro').classList.toggle('active', modo === 'registro');
    }
    // Limpiar errores
    ['login-error','reg-error','reg-success','rec-error','rec-success'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
  }

  function cambiarTab(tab) {
    mostrarModo(tab);
  }

  function mostrarError(elId, msg) {
    var el = document.getElementById(elId);
    el.textContent = msg;
    el.classList.remove('success');
    el.classList.add('error');
    el.style.display = 'block';
  }

  function mostrarOk(elId, msg) {
    var el = document.getElementById(elId);
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function hacerLogin() {
    var email = document.getElementById('login-email').value.trim();
    var pass = document.getElementById('login-pass').value;
    var btn = document.getElementById('btn-login');
    var errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    if (!email || !pass) {
      mostrarError('login-error', 'Completá email y contraseña');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    try {
      var { data, error } = await supabase.auth.signInWithPassword({ email: email, password: pass });
      if (error) {
        var msg = error.message;
        if (msg.indexOf('Invalid login') >= 0) msg = 'Email o contraseña incorrectos';
        else if (msg.indexOf('Email not confirmed') >= 0) msg = 'Tenés que confirmar el mail antes de ingresar';
        mostrarError('login-error', msg);
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        return;
      }
      window.location.href = '/app';
    } catch(e) {
      console.error('login error', e);
      mostrarError('login-error', 'Error de conexión. Probá de nuevo.');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  }

  async function hacerRegistro() {
    var negocio = document.getElementById('reg-negocio').value.trim();
    var email = document.getElementById('reg-email').value.trim();
    var pass = document.getElementById('reg-pass').value;
    var btn = document.getElementById('btn-registro');
    document.getElementById('reg-error').style.display = 'none';
    document.getElementById('reg-success').style.display = 'none';

    if (!negocio || !email || !pass) {
      mostrarError('reg-error', 'Completá todos los campos');
      return;
    }
    if (pass.length < 6) {
      mostrarError('reg-error', 'La contraseña debe tener al menos 6 caracteres');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creando cuenta...';

    try {
      var { data, error } = await supabase.auth.signUp({
        email: email,
        password: pass,
        options: { data: { nombre_negocio: negocio } }
      });
      if (error) {
        var msg = error.message;
        if (msg.indexOf('already registered') >= 0 || msg.indexOf('already exists') >= 0) {
          msg = 'Ese email ya está registrado. Probá ingresando.';
        }
        mostrarError('reg-error', msg);
        btn.disabled = false;
        btn.textContent = 'Crear cuenta gratis';
        return;
      }

      if (data.user) {
        await supabase.from('profiles').update({ nombre_negocio: negocio }).eq('id', data.user.id);
      }

      if (data.session) {
        window.location.href = '/app';
      } else {
        mostrarOk('reg-success', 'Cuenta creada. Revisá tu mail para confirmar y después ingresá.');
        btn.disabled = false;
        btn.textContent = 'Crear cuenta gratis';
      }
    } catch(e) {
      console.error('registro error', e);
      mostrarError('reg-error', 'Error de conexión. Probá de nuevo.');
      btn.disabled = false;
      btn.textContent = 'Crear cuenta gratis';
    }
  }

  async function recuperar() {
    var email = document.getElementById('login-email').value.trim();
    if (!email) {
      mostrarError('login-error', 'Escribí tu email arriba y volvé a tocar "Olvidaste tu contraseña"');
      return;
    }
    try {
      var redirectUrl = window.location.origin + '/login.html';
      var { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });
      if (error) {
        mostrarError('login-error', 'No se pudo enviar el mail: ' + error.message);
      } else {
        var ok = document.getElementById('login-error');
        ok.classList.remove('error');
        ok.classList.add('success');
        ok.textContent = '✉️ Te enviamos un mail. Abrí el link y podrás poner una nueva contraseña.';
        ok.style.display = 'block';
      }
    } catch(e) {
      console.error('recuperar', e);
    }
  }

  async function hacerCambioContrasenia() {
    var pass  = document.getElementById('rec-pass').value;
    var pass2 = document.getElementById('rec-pass2').value;
    var btn   = document.getElementById('btn-recovery');
    document.getElementById('rec-error').style.display   = 'none';
    document.getElementById('rec-success').style.display = 'none';

    if (!pass || pass.length < 6) {
      mostrarError('rec-error', 'La contraseña debe tener al menos 6 caracteres');
      return;
    }
    if (pass !== pass2) {
      mostrarError('rec-error', 'Las contraseñas no coinciden');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      var { error } = await supabase.auth.updateUser({ password: pass });
      if (error) {
        mostrarError('rec-error', 'Error: ' + error.message);
        btn.disabled = false;
        btn.textContent = 'Guardar nueva contraseña';
        return;
      }
      mostrarOk('rec-success', '✅ Contraseña actualizada. Redirigiendo...');
      setTimeout(function() { window.location.href = '/app'; }, 2000);
    } catch(e) {
      console.error('cambioContrasenia', e);
      mostrarError('rec-error', 'Error de conexión. Probá de nuevo.');
      btn.disabled = false;
      btn.textContent = 'Guardar nueva contraseña';
    }
  }

  document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') hacerLogin();
  });
  document.getElementById('reg-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') hacerRegistro();
  });
  document.getElementById('rec-pass2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') hacerCambioContrasenia();
  });

  // Pintar íconos estáticos del HTML
  function pintarIconosEstaticos(root) {
    (root || document).querySelectorAll('.icon-slot[data-icon]').forEach(function(el) {
      var name = el.dataset.icon;
      if (window.Icon && typeof window.Icon[name] === 'function') {
        el.innerHTML = window.Icon[name]();
      }
    });
  }
  document.addEventListener('DOMContentLoaded', function(){ pintarIconosEstaticos(); });
  pintarIconosEstaticos();
</script>

</body>
</html>
